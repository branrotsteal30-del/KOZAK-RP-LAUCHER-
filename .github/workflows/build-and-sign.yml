name: Build and Sign

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      sign:
        description: 'Sign the build'
        required: false
        default: false
        type: boolean

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
        
    - name: Restore dependencies
      run: dotnet restore
      
    - name: Build Release
      run: dotnet build --configuration Release --no-restore
      
    - name: Setup Inno Setup
      uses: jldeen/setup-inno@v1
      with:
        version: 6.3.3
        
    - name: Build Installer
      run: |
        cd installer
        build_inno_installer.bat
        
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build
        path: |
          bin/Release/net48/*.exe
          installer/installer_output/*.exe
